name: Retry Pages Deployment

on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]

permissions:
  pages: write
  actions: read

jobs:
  retry:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Check recent failure streak
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILS=$(gh api "repos/${{ github.repository }}/actions/runs?per_page=5" \
            --jq '[.workflow_runs[] | select(.name=="pages build and deployment") | .conclusion] | map(select(. == "failure")) | length')
          echo "fails=$FAILS" >> "$GITHUB_OUTPUT"

      - name: Wait before retry
        if: fromJSON(steps.check.outputs.fails) < 3
        run: sleep 30

      - name: Request Pages rebuild
        if: fromJSON(steps.check.outputs.fails) < 3
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X POST "repos/${{ github.repository }}/pages/builds"
